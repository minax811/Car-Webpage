<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Corporation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --blue: #1d4ed8;
    --blue-bright: #3b6df0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #000;
    color: #fff;
    font-family: 'Work Sans', Arial, sans-serif;
    overflow-x: hidden;
  }

  /* Total Background */
  .hero {
    position: relative;
    width: 100%;
    height: 56vh;
    min-height: 320px;
    max-height: 560px;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.9);
  }

  /* Gradient layer that dissolves the image into the black background */
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0, 0, 0, 0) 0%,
      rgba(0, 0, 0, 0) 35%,
      rgba(0, 0, 0, 0.55) 65%,
      #000 100%
    );
  }

  /* Brand block */
  main {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: -56px;
    padding: 0 26px 80px;
  }

  .brand {
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 9vw, 5.5rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #a80505;
    line-height: 1;
    display: inline-block;
    transform: scaleX(1.08);
  }
/* title font */
  .tagline,
  .description {
    font-family: 'Work Sans', sans-serif;
    font-weight: 500;
    font-size: clamp(0.85rem, 1.6vw, 1.05rem);
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.85);
    text-align: left;
    max-width: 760px;
    margin: 14px auto 0;
  }

  .description {
    font-size: 1rem;
    line-height: 1.65;
    color: rgba(255, 255, 255, 0.72);
  }

  /*Blue bar */
  .link-bar {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 22px;
    max-width: 500px;
    margin: 56px auto 0;
    padding: 40px 44px;
    background: var(--blue);
    border-radius: 6px;
  
  }

  .link-bar a {
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: 0.5px;
    padding: 4px 2px;
  }

  .link-bar a:focus-visible {
    outline: 2px solid #ffffff;
    outline-offset: 4px;
    border-radius: 2px;
  }

  @media (max-width: 480px) {
    .link-bar { max-width: 90%; padding: 32px 28px; }
  }
</style>
</head>
<body>

<header class="hero">
  <img src="./Image/bmw-hill.jpg" alt="BMW Mountain banner">
</header>

<main>
  <h1 class="brand">BMW</h1>
  <p class="tagline">About BMW</p>
  <p class="description">BMW is a German multinational automotive manufacturer known for its luxury vehicles.</p>

  <nav class="link-bar">
    <a href="./Catagories/Sedans.html">Sedans</a>
    <a href="./Catagories/SUVs.html">SUVs</a>
    <a href="./Catagories/Coupes.html">Coupes</a>
    <a href="./Catagories/Convertibles.html">Convertibles</a>
    <a href="./Catagories/Wagons.html">Wagons</a>
    <a href="./Catagories/Hatchbacks.html">Hatchbacks</a>
  </nav>
</main>

</body>
</html>
